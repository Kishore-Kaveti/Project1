<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi this is Kisshore</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: #b9c2d3;
      --cyan: #64e7ff;
      --rose: #ff7ab6;
      --gold: #ffd166;
      --panel: rgba(10, 18, 32, 0.72);
      --line: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(100, 231, 255, 0.28), transparent 32%),
        radial-gradient(circle at 82% 72%, rgba(255, 122, 182, 0.22), transparent 34%),
        linear-gradient(135deg, #101726 0%, #1f2433 42%, #111827 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .grid {
      position: absolute;
      inset: -20%;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at center, black, transparent 72%);
      transform: perspective(700px) rotateX(58deg) translateY(18%);
      opacity: 0.48;
      animation: drift 12s linear infinite;
    }

    .spark {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--gold);
      box-shadow: 0 0 18px var(--gold);
      opacity: 0.85;
      animation: float 6s ease-in-out infinite;
    }

    .spark:nth-child(2) {
      left: 14%;
      top: 30%;
      animation-delay: -1.4s;
    }

    .spark:nth-child(3) {
      left: 78%;
      top: 22%;
      background: var(--cyan);
      box-shadow: 0 0 18px var(--cyan);
      animation-delay: -3.1s;
    }

    .spark:nth-child(4) {
      left: 70%;
      top: 76%;
      background: var(--rose);
      box-shadow: 0 0 18px var(--rose);
      animation-delay: -4.4s;
    }

    main {
      position: relative;
      width: min(92vw, 740px);
      padding: clamp(28px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow:
        0 26px 80px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(22px);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 34px;
      padding: 8px 13px;
      border: 1px solid rgba(100, 231, 255, 0.35);
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(100, 231, 255, 0.09);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 16px currentColor;
    }

    h1 {
      margin: 26px 0 18px;
      font-size: clamp(3.6rem, 13vw, 8.5rem);
      line-height: 0.88;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 0 34px rgba(100, 231, 255, 0.25);
    }

    h1 span {
      display: block;
      background: linear-gradient(90deg, #ffffff, var(--cyan) 43%, var(--rose));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      max-width: 560px;
      margin: 0 auto 34px;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 8px;
      color: #08111f;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
      box-shadow: 0 12px 28px rgba(100, 231, 255, 0.18);
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(100, 231, 255, 0.28);
    }

    .ghost {
      border: 1px solid var(--line);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    @keyframes drift {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 46px 46px;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(18px, -26px, 0) scale(1.35);
      }
    }

    @media (max-width: 560px) {
      body {
        place-items: stretch;
        padding: 18px;
      }

      main {
        align-self: center;
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="grid"></div>
    <div class="spark"></div>
    <div class="spark"></div>
    <div class="spark"></div>
  </div>

  <main>
    <div class="badge">Transmission online</div>
    <h1>Hello <span>World</span></h1>
    <p>A tiny page with a bit of glow, motion, and polish. Open it in any browser and it is ready to greet the universe.</p>
    <div class="actions">
      <a href="#" aria-label="Say hello">Say Hello</a>
      <a class="ghost" href="#" aria-label="Explore">Explore</a>
    </div>
  </main>
</body>
</html>
