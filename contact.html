<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: #b9c2d3;
      --cyan: #64e7ff;
      --rose: #ff7ab6;
      --gold: #ffd166;
      --panel: rgba(10, 18, 32, 0.72);
      --line: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(100, 231, 255, 0.28), transparent 32%),
        radial-gradient(circle at 82% 72%, rgba(255, 122, 182, 0.22), transparent 34%),
        linear-gradient(135deg, #101726 0%, #1f2433 42%, #111827 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    nav {
      position: fixed;
      top: 22px;
      left: 50%;
      z-index: 2;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(10, 18, 32, 0.62);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(18px);
      transform: translateX(-50%);
    }

    .scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .grid {
      position: absolute;
      inset: -20%;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at center, black, transparent 72%);
      transform: perspective(700px) rotateX(58deg) translateY(18%);
      opacity: 0.48;
      animation: drift 12s linear infinite;
    }

    .spark {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--gold);
      box-shadow: 0 0 18px var(--gold);
      opacity: 0.85;
      animation: float 6s ease-in-out infinite;
    }

    .spark:nth-child(2) {
      left: 14%;
      top: 30%;
      animation-delay: -1.4s;
    }

    .spark:nth-child(3) {
      left: 78%;
      top: 22%;
      background: var(--cyan);
      box-shadow: 0 0 18px var(--cyan);
      animation-delay: -3.1s;
    }

    .spark:nth-child(4) {
      left: 70%;
      top: 76%;
      background: var(--rose);
      box-shadow: 0 0 18px var(--rose);
      animation-delay: -4.4s;
    }

    main {
      position: relative;
      width: min(92vw, 760px);
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow:
        0 26px 80px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(22px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 34px;
      padding: 8px 13px;
      border: 1px solid rgba(100, 231, 255, 0.35);
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(100, 231, 255, 0.09);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 16px currentColor;
    }

    h1 {
      margin: 24px 0 16px;
      font-size: clamp(2.8rem, 9vw, 6.6rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 0 34px rgba(100, 231, 255, 0.25);
    }

    h1 span {
      background: linear-gradient(90deg, #ffffff, var(--cyan) 43%, var(--rose));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      max-width: 620px;
      margin: 0 0 28px;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      font: inherit;
      outline: none;
      padding: 14px 15px;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(100, 231, 255, 0.7);
      box-shadow: 0 0 0 4px rgba(100, 231, 255, 0.12);
    }

    button,
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      color: #08111f;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
      box-shadow: 0 12px 28px rgba(100, 231, 255, 0.18);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    nav a {
      min-height: 36px;
      padding: 0 14px;
      color: var(--muted);
      background: transparent;
      box-shadow: none;
      font-size: 0.92rem;
      font-weight: 700;
    }

    nav a[aria-current="page"] {
      color: #08111f;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
    }

    button:hover,
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(100, 231, 255, 0.28);
    }

    @keyframes drift {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 46px 46px;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(18px, -26px, 0) scale(1.35);
      }
    }

    @media (max-width: 560px) {
      body {
        place-items: stretch;
        min-height: auto;
        padding: 86px 18px 18px;
        overflow: auto;
      }

      nav {
        top: 14px;
        width: calc(100% - 28px);
        justify-content: center;
      }

      nav a {
        flex: 1;
        padding: 0 8px;
      }

      main {
        align-self: center;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" aria-current="page">Contact</a>
  </nav>

  <div class="scene" aria-hidden="true">
    <div class="grid"></div>
    <div class="spark"></div>
    <div class="spark"></div>
    <div class="spark"></div>
  </div>

  <main>
    <div class="badge">Contact channel</div>
    <h1>Send a <span>hello.</span></h1>
    <p>Drop a note into the form below. It is styled and ready for a real backend later, but for now it keeps the experience beautifully local.</p>

    <form>
      <label>
        Name
        <input type="text" name="name" placeholder="Ada Lovelace">
      </label>
      <label>
        Email
        <input type="email" name="email" placeholder="ada@example.com">
      </label>
      <label>
        Message
        <textarea name="message" placeholder="Hello from the other side of the screen..."></textarea>
      </label>
      <button type="submit">Send Message</button>
    </form>
  </main>
</body>
</html>
